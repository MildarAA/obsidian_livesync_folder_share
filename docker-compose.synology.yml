services:
  obsidian_livesync_folder_share:
    image: ${SYNC_IMAGE:-obsidian_livesync_folder_share:latest}
    env_file:
      - .env
    environment:
      COUCHDB_USER_FILE: /run/secrets/couchdb_user
      COUCHDB_PASSWORD_FILE: /run/secrets/couchdb_password
      LIVESYNC_PASSPHRASE_FILE: /run/secrets/livesync_passphrase
      STATE_FILE: /data/state.json
      LOG_FILE: /logs/sync.log
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./secrets/couchdb_user.txt:/run/secrets/couchdb_user:ro
      - ./secrets/couchdb_password.txt:/run/secrets/couchdb_password:ro
      - ./secrets/livesync_passphrase.txt:/run/secrets/livesync_passphrase:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "/app/sync.py", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
